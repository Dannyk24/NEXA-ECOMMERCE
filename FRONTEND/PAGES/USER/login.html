<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA USER AUTH</title>
    <link rel="icon" href="../../ASSETS/IMAGES/favicon-white.svg">
    <link rel="stylesheet" href="../../CSS/GLOBAL/style.css">
    <link rel="stylesheet" href="../../CSS/CUSTOM/USER/auth.css">
    <link rel="stylesheet" href="../../ASSETS/fontawesome/css/all.min.css">
</head>
<body>
    <div class="wrapper authentication-page-wrapper">
        <div class="left-section">
            <div class="top-light"></div>
            <div class="logo"><img src="../../ASSETS/IMAGES/nexa-logo.svg" alt="app-logo"></div>
            <h1 class="form-header">welcome back</h1>
            <p class="form-subheader">Enter you credentials to access your curated selection</p>
            <form action="#" id="login-auth-form">
                <div class="auth-form-input-field-container">
                    <label for="email">email address</label>
                    <input type="email" required placeholder="name@example.com">
                </div>
                <div class="auth-form-input-field-container">
                    <label for="password">password</label>
                    <div>
                        <input type="password" required placeholder="Password">
                        <i class="fas fa-eye"></i>
                    </div>
                </div>
                <a href="#" class="form-submit-button primary-button">login</a>
                <span>Don't have an account yet? <a href="sign-up.html">Sign Up</a></span>
                <a href="../../../index.html" class="back-to-homepage-link">Back to home</a>
            </form>
        </div>
        <div class="right-section">
            <div class="background-video-container">
                <video src="../../ASSETS/VIDEOS/LOGIN-PAGE-BACKGROUND-VIDEO.mp4" autoplay muted loop playsinline></video>
            </div>
        </div>
    </div>

    <script src="../../../BACKEND/AUTH/auth.js" type="module"></script>
</body>
</html>
